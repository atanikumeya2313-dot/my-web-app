<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <defs>
    <radialGradient id="body" cx="42%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="55%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </radialGradient>
    <radialGradient id="pupil" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shadow -->
  <ellipse cx="100" cy="218" rx="52" ry="9" fill="rgba(0,0,0,0.18)"/>

  <!-- Body -->
  <path d="M100,32 C62,32 24,68 24,115 C24,162 58,196 100,196 C142,196 176,162 176,115 C176,68 138,32 100,32 Z" fill="url(#body)"/>

  <!-- Bottom shading -->
  <ellipse cx="100" cy="176" rx="62" ry="24" fill="#0891b2" opacity="0.32"/>

  <!-- Highlight large -->
  <ellipse cx="70" cy="68" rx="27" ry="19" fill="rgba(255,255,255,0.52)" transform="rotate(-35,70,68)"/>
  <!-- Highlight small -->
  <ellipse cx="130" cy="54" rx="12" ry="8" fill="rgba(255,255,255,0.36)" transform="rotate(-20,130,54)"/>

  <!-- Eyes white -->
  <circle cx="76" cy="118" r="18" fill="white"/>
  <circle cx="124" cy="118" r="18" fill="white"/>
  <!-- Pupils -->
  <circle cx="80" cy="121" r="11" fill="url(#pupil)"/>
  <circle cx="128" cy="121" r="11" fill="url(#pupil)"/>
  <!-- Irises -->
  <circle cx="83" cy="118" r="4.5" fill="black"/>
  <circle cx="131" cy="118" r="4.5" fill="black"/>
  <!-- Eye shine main -->
  <circle cx="86" cy="114" r="3.5" fill="white"/>
  <circle cx="134" cy="114" r="3.5" fill="white"/>
  <!-- Eye shine small -->
  <circle cx="79" cy="127" r="1.8" fill="rgba(255,255,255,0.6)"/>
  <circle cx="127" cy="127" r="1.8" fill="rgba(255,255,255,0.6)"/>

  <!-- Cheeks -->
  <ellipse cx="60" cy="137" rx="12" ry="7" fill="rgba(255,130,130,0.28)"/>
  <ellipse cx="140" cy="137" rx="12" ry="7" fill="rgba(255,130,130,0.28)"/>

  <!-- Smile -->
  <path d="M80,148 Q100,165 120,148" stroke="#0c4a6e" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Tongue -->
  <ellipse cx="100" cy="162" rx="10" ry="6" fill="#fb7185"/>

  <!-- Antenna -->
  <path d="M100,32 C104,18 114,6 110,0 C106,-3 101,10 100,13 C99,10 94,-3 90,0 C86,6 96,18 100,32 Z" fill="url(#body)"/>
  <circle cx="100" cy="1" r="6" fill="#67e8f9" filter="url(#glow)"/>

  <!-- Drips -->
  <ellipse cx="55" cy="202" rx="15" ry="10" fill="#22d3ee"/>
  <ellipse cx="145" cy="200" rx="12" ry="9" fill="#22d3ee"/>
  <ellipse cx="97" cy="207" rx="10" ry="8" fill="#22d3ee"/>
  <ellipse cx="122" cy="209" rx="7" ry="6" fill="#0ea5e9"/>
</svg>
